name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - run: npm install -g prettier@3.4.2
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: ./scripts/ci-lint.sh
      - run: ./scripts/ci-test.sh
